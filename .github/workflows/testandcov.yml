name: pytest

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-coverage:
    name: py ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # load_videos / ffmpeg.probe need ffprobe on PATH; nbconvert tests need it too.
      - name: Set up FFmpeg (ffprobe)
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install project (dev + docs)
        run: uv sync --group dev --extra docs

      - name: Lint with black
        run: uv run black --check minian

      - name: Run Sphinx doctest
        if: runner.os == 'Linux'
        run: uv run sphinx-build -M doctest docs/source docs/build

      - name: Run tests and collect coverage
        env:
          MINIAN_NWORKERS: ${{ runner.os == 'macOS' && '3' || '2' }}
        run: |
          mkdir -p artifact
          if [ -d img ]; then cp -R img artifact/; fi
          uv run pytest -v --color=yes --cov=minian --cov-report=xml --cov-report=term --pyargs minian

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Artifact name suffix
        id: commit_sha
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "value=${{ github.event.pull_request.head.sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${{ github.sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload notebook artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: notebooks-${{ steps.commit_sha.outputs.value }}
          path: artifact

      - name: Trigger RTDs build
        uses: dfm/rtds-action@v1
        if: runner.os == 'Linux' && github.event_name == 'push'
        with:
          webhook_url: ${{ secrets.RTDS_WEBHOOK_URL }}
          webhook_token: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          commit_ref: ${{ github.ref }}
