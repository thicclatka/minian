# Pings Read the Docs build webhooks on pushes to the default branches.
# Keeps RTD separate from the pytest/coverage matrix job.

name: readthedocs

on:
  push:
    branches: [main, master]

jobs:
  webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Read the Docs build (or skip if secrets unset)
        env:
          RTDS_WEBHOOK_URL: ${{ secrets.RTDS_WEBHOOK_URL }}
          RTDS_WEBHOOK_TOKEN: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RTDS_WEBHOOK_URL}" ]] || [[ -z "${RTDS_WEBHOOK_TOKEN}" ]]; then
            echo "::notice::Skipped Read the Docs webhook; set RTDS_WEBHOOK_URL and RTDS_WEBHOOK_TOKEN to enable."
            exit 0
          fi
          branch=$(echo "${GITHUB_REF}" | cut -d/ -f3-)
          curl -fsS -X POST "${RTDS_WEBHOOK_URL}" \
            --data-urlencode "branches=${branch}" \
            --data-urlencode "token=${RTDS_WEBHOOK_TOKEN}"
